name: Tự động kiểm tra & đăng bài Fanpage
run-name: Kiểm tra lịch đăng bài

on:
  schedule:
    - cron: '*/5 16-23 * * *'   # 0h-7h VN
    - cron: '*/5 0-16 * * *'    # 8h-23h VN
  workflow_dispatch:

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Cài Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '22' # Đổi sang phiên bản mới, không còn cảnh báo
          cache: 'npm'

      - name: Cài thư viện
        working-directory: ./scheduler
        run: npm ci # Cài chính xác theo package-lock.json nếu có

      - name: Chạy script đăng bài
        working-directory: ./scheduler
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node run.js